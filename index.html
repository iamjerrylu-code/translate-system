<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>平鎮戶政雙向翻譯服務系統</title>
  <!-- PWA 設定：讓「加入主畫面」後可全螢幕啟動 -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#2c3e50">
  <!-- iOS Safari 專用：讓「加入主畫面」的捷徑以獨立模式啟動（隱藏網址列） -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="雙向翻譯">

  <style>
    /* 基礎排版設定 */
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
      background-color: #f4f7f6;
    }

    .container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
      height: 100dvh;
    }

    /* 上下兩個面板共用設定 */
    .panel {
      padding: clamp(8px, 2.5vw, 20px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      position: relative;
      min-height: 0;
    }

    /* 民眾端（上方）：置於桌上時朝向對面的民眾，因此整塊翻轉 180 度 */
    .panel-citizen {
      flex: 5.5;
      background-color: #eef2f5;
      border-bottom: 2px solid #ddd;
      transform: rotate(180deg);
    }

    /* 櫃檯人員端（下方）：靠近操作人員這一側，維持正常方向 */
    .panel-staff {
      flex: 4.5;
      background-color: #f4f7f6;
    }

    /* 標題與選單 */
    h2 {
      color: #333;
      font-size: clamp(1.1em, 4.5vw, 1.8em);
      margin: 0 0 8px 0;
      flex-shrink: 0;
    }

    select {
      font-size: clamp(0.9em, 3.2vw, 1.3em);
      padding: clamp(4px, 1.5vw, 8px) clamp(8px, 3vw, 16px);
      margin-bottom: clamp(6px, 2vw, 12px);
      border-radius: 8px;
      border: 1px solid #ccc;
      flex-shrink: 0;
      max-width: 90%;
    }

    /* 隱私提醒黃色警示條 */
    .privacy-notice {
      width: 92%;
      max-width: 700px;
      background-color: #ffeb3b;
      color: #1a1a1a;
      font-size: clamp(0.7em, 2.6vw, 1em);
      font-weight: bold;
      padding: clamp(4px, 1.2vw, 8px) clamp(8px, 2vw, 14px);
      border-radius: 8px;
      margin-bottom: clamp(6px, 1.5vw, 10px);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    /* 顯示文字的區塊 */
    .text-box {
      width: 92%;
      max-width: 700px;
      flex: 1;
      min-height: 0;
      background: white;
      border-radius: 15px;
      padding: clamp(10px, 3vw, 20px);
      font-size: clamp(1.3em, 6vw, 3.6em);
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      overflow-y: auto;
      margin-bottom: clamp(8px, 2.5vw, 16px);
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      line-height: 1.4;
      word-break: break-word;
    }

    /* 櫃檯人員對話框文字顏色：藍色 */
    #staff-text {
      color: #1565C0;
    }

    /* 外籍民眾對話框文字顏色：粉紅色 */
    #citizen-text {
      color: #D6336C;
    }

    /* 按鈕設計 */
    .btn {
      font-size: clamp(1em, 4vw, 1.5em);
      padding: clamp(10px, 2.5vw, 14px) clamp(24px, 8vw, 40px);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      color: white;
      transition: 0.3s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      flex-shrink: 0;
      white-space: nowrap;
    }

    .btn-staff {
      background-color: #4CAF50; /* 綠色 */
    }

    .btn-staff:hover {
      background-color: #45a049;
    }

    .btn-citizen {
      background-color: #2196F3; /* 藍色 */
    }

    .btn-citizen:hover {
      background-color: #0b7dda;
    }

    /* 收音時的動畫效果 */
    .btn.recording {
      background-color: #f44336; /* 紅色 */
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    /* 開始畫面（用來取得使用者互動，才能觸發全螢幕） */
    #start-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #2c3e50;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      cursor: pointer;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    #start-overlay h1 {
      font-size: clamp(1.3em, 5vw, 2em);
      margin-bottom: 20px;
    }

    #start-overlay p {
      font-size: clamp(0.9em, 3.5vw, 1.2em);
      opacity: 0.85;
    }

    /* 手機直向、螢幕較窄時，稍微收緊間距 */
    @media (max-width: 480px) {
      .panel {
        padding: 6px;
      }
      h2 {
        margin-bottom: 4px;
      }
    }

    /* 手機橫向、螢幕高度較矮時，避免面板被壓縮到看不清楚 */
    @media (max-height: 420px) {
      h2 {
        font-size: clamp(1em, 4vw, 1.3em);
        margin-bottom: 2px;
      }
      select {
        margin-bottom: 4px;
      }
      .privacy-notice {
        font-size: clamp(0.6em, 2.2vw, 0.8em);
        padding: 3px 8px;
        margin-bottom: 4px;
      }
      .text-box {
        font-size: clamp(1.1em, 5vw, 2em);
        padding: 8px;
        margin-bottom: 6px;
      }
      .btn {
        padding: 8px 20px;
      }
    }
  </style>
</head>
<body>

  <!-- 開場點擊畫面：用來取得使用者手勢以進入全螢幕 -->
  <div id="start-overlay" onclick="startApp()">
    <h1>👆 請點擊螢幕開始使用</h1>
    <p>Tap the screen to start / タップして開始</p>
  </div>

  <div class="container">

    <!-- 民眾端 (上方，翻轉180度朝向對面) -->
    <div class="panel panel-citizen">
      <h2>外籍民眾</h2>
      <select id="lang-select" onchange="updateSpeakLabel(); updatePrivacyNotice();">
        <option value="en">English (英文)</option>
        <option value="ja">日本語 (日文)</option>
        <option value="ko">한국어 (韓文)</option>
        <option value="vi">Tiếng Việt (越南文)</option>
        <option value="id">Bahasa Indonesia (印尼文)</option>
        <option value="th">ภาษาไทย (泰文)</option>
        <option value="fil">Filipino (菲律賓文)</option>
        <option value="km">ភាសាខ្មែរ (柬埔寨文)</option>
        <option value="my">မြန်မာဘာသာ (緬甸文)</option>
      </select>
      <div class="privacy-notice" id="privacy-notice">Please, no personal details in the chat.</div>
      <div class="text-box" id="citizen-text">Waiting for voice...</div>
      <button class="btn btn-citizen" id="btn-citizen" onclick="startRecognition(document.getElementById('lang-select').value, 'citizen-text', 'staff-text', 'zh-TW')">
        Speak
      </button>
    </div>

    <!-- 櫃檯人員端 (下方，正常方向) -->
    <div class="panel panel-staff">
      <h2>平鎮戶政櫃檯人員</h2>
      <div class="privacy-notice">交談中避免透露詳細個資</div>
      <div class="text-box" id="staff-text">請按下方按鈕開始說話</div>
      <button class="btn btn-staff" id="btn-staff" onclick="startRecognition('zh-TW', 'staff-text', 'citizen-text', document.getElementById('lang-select').value)">
        中文發言
      </button>
    </div>

  </div>

  <script>
    // ⚠️ 請將雙引號內的網址替換為你 Google Apps Script 部署後產生的 Web App URL ⚠️
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwelifoH99yjFvjMIY_vraVf4LiRxypJ1-wKAWXQy1wJussTI58GALefPker17Lqlg/exec";

    // 檢查瀏覽器是否支援語音辨識 API
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    // 註冊 Service Worker（滿足 Android「加入主畫面/安裝應用程式」的條件）
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js').catch(function(err) {
          console.warn('Service worker 註冊失敗：', err);
        });
      });
    }

    // 各語言對應的「Speak」按鈕文字
    const speakLabels = {
      en: "Speak",
      ja: "話す",
      ko: "말하기",
      vi: "Nói",
      id: "Bicara",
      th: "พูด",
      fil: "Magsalita",
      km: "និយាយ",
      my: "ပြောပါ"
    };

    // 各語言對應的「翻譯中...」提示文字
    const translatingLabels = {
      en: "Translating...",
      ja: "翻訳中...",
      ko: "번역 중...",
      vi: "Đang dịch...",
      id: "Menerjemahkan...",
      th: "กำลังแปล...",
      fil: "Isinasalin...",
      km: "កំពុងបកប្រែ...",
      my: "ဘာသာပြန်နေသည်..."
    };

    // 各語言對應的「避免透露詳細個資」提醒文字（力求簡短、不超出一行）
    const privacyLabels = {
      en: "Please, no personal details in the chat.",
      ja: "詳しい個人情報は共有しないでください",
      ko: "개인정보를 자세히 공유하지 마세요",
      vi: "Vui lòng không chia sẻ thông tin cá nhân chi tiết",
      id: "Mohon jangan bagikan data pribadi secara rinci",
      th: "กรุณาอย่าให้ข้อมูลส่วนตัวโดยละเอียด",
      fil: "Huwag ibahagi ang detalyadong personal na impormasyon",
      km: "សូមកុំបញ្ចេញព័ត៌មានផ្ទាល់ខ្លួនលម្អិត",
      my: "ကိုယ်ရေးအချက်အလက်အသေးစိတ် မမျှဝေပါနှင့်"
    };

    function updateSpeakLabel() {
      const lang = document.getElementById('lang-select').value;
      const btn = document.getElementById('btn-citizen');
      // 若正在收音中，先不覆蓋「收音中...」的提示文字
      if (!btn.classList.contains('recording')) {
        btn.innerText = speakLabels[lang] || "Speak";
      }
    }

    // 更新黃底黑字的隱私提醒文字（隨語言切換）
    function updatePrivacyNotice() {
      const lang = document.getElementById('lang-select').value;
      document.getElementById('privacy-notice').innerText = privacyLabels[lang] || privacyLabels.en;
    }

    // 頁面載入時，依預設選擇的語言設定一次按鈕文字與隱私提醒
    updateSpeakLabel();
    updatePrivacyNotice();

    // ------- 開場點擊：進入全螢幕、預先索取麥克風權限、並隱藏開場畫面 -------
    function startApp() {
      const el = document.documentElement;
      const requestFS = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
      if (requestFS) {
        requestFS.call(el).catch(err => {
          console.warn("無法進入全螢幕：", err);
        });
      }

      // 提早跟系統要一次麥克風權限，讓瀏覽器（尤其是 Android/Chrome）
      // 盡早把「允許」記住，減少之後語音辨識時重複詢問的機率。
      // 注意：iOS「加入主畫面」的獨立模式，因系統本身限制，仍可能偶爾重新詢問。
      if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ audio: true })
          .then(function(stream) {
            // 拿到權限後立刻關閉音軌，不會真的錄音或上傳
            stream.getTracks().forEach(function(track) { track.stop(); });
          })
          .catch(function(err) {
            console.warn("麥克風權限請求失敗或被拒絕：", err);
          });
      }

      document.getElementById("start-overlay").style.display = "none";
    }

    // 如果使用者用手勢離開全螢幕（例如平板系統手勢），再次點擊畫面任一處可重新進入全螢幕
    document.addEventListener("fullscreenchange", function() {
      if (!document.fullscreenElement) {
        document.getElementById("start-overlay").style.display = "flex";
        document.getElementById("start-overlay").querySelector("h1").innerText = "👆 已離開全螢幕，請點擊螢幕重新開始";
      }
    });

    function startRecognition(sourceLang, sourceElemId, targetElemId, targetLang) {
      if (!SpeechRecognition) {
        alert("您的瀏覽器不支援語音辨識，建議使用 Chrome 瀏覽器。");
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = sourceLang;
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      const btn = event.target;
      const originalText = btn.innerText;

      // 變更按鈕樣式提示正在收音
      btn.classList.add("recording");
      btn.innerText = "收音中...";
      document.getElementById(sourceElemId).innerText = "聆聽中...";

      recognition.start();

      // 辨識成功，取得文字
      recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript;
        document.getElementById(sourceElemId).innerText = transcript;

        // 目標畫面若是外籍民眾端，「翻譯中」文字需依其選定語言顯示；
        // 若目標是櫃檯人員端（中文），維持顯示中文提示
        const translatingText = (targetElemId === 'citizen-text')
          ? (translatingLabels[targetLang] || "Translating...")
          : "翻譯中...";
        document.getElementById(targetElemId).innerText = translatingText;

        // 呼叫翻譯函數
        translateText(transcript, sourceLang, targetLang, targetElemId);
      };

      recognition.onspeechend = function() {
        recognition.stop();
      };

      recognition.onend = function() {
        btn.classList.remove("recording");
        btn.innerText = originalText;
      };

      recognition.onerror = function(event) {
        console.error("語音辨識錯誤代碼：", event.error);
        document.getElementById(sourceElemId).innerText = "辨識失敗（" + event.error + "），請再試一次。";
        btn.classList.remove("recording");
        btn.innerText = originalText;
      };
    }

    // 傳送文字至 Google Apps Script 進行翻譯
    function translateText(text, source, target, targetElemId) {
      // 組合 API 請求網址
      const url = `${GAS_URL}?text=${encodeURIComponent(text)}&source=${source}&target=${target}`;

      fetch(url)
        .then(response => response.json())
        .then(data => {
          // 將翻譯結果顯示在對方的畫面上
          document.getElementById(targetElemId).innerText = data.translated;
        })
        .catch(error => {
          console.error('Error:', error);
          document.getElementById(targetElemId).innerText = "連線翻譯伺服器發生錯誤";
        });
    }
  </script>
</body>
</html>
